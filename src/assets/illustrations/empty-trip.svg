<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="suitcaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76abff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="suitcaseBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1420;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 地面阴影 -->
  <ellipse cx="100" cy="165" rx="60" ry="8" fill="#000" opacity="0.2"/>
  
  <!-- 行李箱主体 -->
  <rect x="55" y="75" width="90" height="75" rx="8" fill="url(#suitcaseBody)" stroke="#76abff" stroke-width="2"/>
  
  <!-- 行李箱拉杆 -->
  <rect x="85" y="45" width="4" height="35" rx="2" fill="#76abff" opacity="0.6"/>
  <rect x="111" y="45" width="4" height="35" rx="2" fill="#76abff" opacity="0.6"/>
  <rect x="83" y="42" width="34" height="6" rx="3" fill="#76abff" opacity="0.4"/>
  
  <!-- 行李箱轮子 -->
  <circle cx="70" cy="155" r="6" fill="#34d399" opacity="0.6"/>
  <circle cx="130" cy="155" r="6" fill="#34d399" opacity="0.6"/>
  
  <!-- 行李箱装饰线条 -->
  <rect x="70" y="95" width="60" height="2" rx="1" fill="#76abff" opacity="0.3"/>
  <rect x="70" y="115" width="60" height="2" rx="1" fill="#76abff" opacity="0.3"/>
  <rect x="70" y="135" width="60" height="2" rx="1" fill="#76abff" opacity="0.3"/>
  
  <!-- 等待中的气泡 -->
  <circle cx="100" cy="35" r="3" fill="#76abff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="30" r="2" fill="#76abff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="32" r="2.5" fill="#76abff" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- 行李箱标签 -->
  <rect x="130" y="85" width="12" height="18" rx="2" fill="#f59e0b" opacity="0.8"/>
  <rect x="132" y="87" width="8" height="2" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="132" y="91" width="8" height="2" rx="1" fill="#fff" opacity="0.6"/>
  <rect x="132" y="95" width="6" height="2" rx="1" fill="#fff" opacity="0.6"/>
</svg>
