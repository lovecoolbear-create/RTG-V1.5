<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="templateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76abff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- 背景装饰圆 -->
  <circle cx="100" cy="100" r="70" fill="url(#templateGrad)" opacity="0.1"/>
  <circle cx="100" cy="100" r="55" fill="url(#templateGrad)" opacity="0.15"/>
  
  <!-- 主模板卡片 -->
  <rect x="60" y="55" width="80" height="100" rx="8" fill="#1a2332" stroke="#76abff" stroke-width="2" opacity="0.9"/>
  
  <!-- 模板标题栏 -->
  <rect x="60" y="55" width="80" height="24" rx="8" fill="#76abff" opacity="0.2"/>
  <rect x="70" y="64" width="40" height="6" rx="3" fill="#76abff" opacity="0.5"/>
  
  <!-- 清单项目行 -->
  <g opacity="0.4">
    <circle cx="72" cy="95" r="5" fill="none" stroke="#76abff" stroke-width="1.5"/>
    <rect x="82" y="92" width="45" height="4" rx="2" fill="#76abff" opacity="0.4"/>
  </g>
  
  <g opacity="0.35">
    <circle cx="72" cy="115" r="5" fill="none" stroke="#76abff" stroke-width="1.5"/>
    <rect x="82" y="112" width="38" height="4" rx="2" fill="#76abff" opacity="0.35"/>
  </g>
  
  <g opacity="0.3">
    <circle cx="72" cy="135" r="5" fill="none" stroke="#76abff" stroke-width="1.5"/>
    <rect x="82" y="132" width="50" height="4" rx="2" fill="#76abff" opacity="0.3"/>
  </g>
  
  <!-- 浮动的小模板卡片（后） -->
  <rect x="35" y="75" width="30" height="40" rx="4" fill="#0d1420" stroke="#76abff" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite"/>
  </rect>
  <line x1="42" y1="88" x2="58" y2="88" stroke="#76abff" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="42" y1="96" x2="54" y2="96" stroke="#76abff" stroke-width="2" opacity="0.25">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- 浮动的小模板卡片（前） -->
  <rect x="135" y="85" width="30" height="40" rx="4" fill="#0d1420" stroke="#34d399" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <line x1="142" y1="98" x2="158" y2="98" stroke="#34d399" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <line x1="142" y1="106" x2="154" y2="106" stroke="#34d399" stroke-width="2" opacity="0.25">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- 加号图标（暗示创建） -->
  <circle cx="165" cy="50" r="12" fill="#34d399" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <path d="M165 44 L165 56 M159 50 L171 50" stroke="#fff" stroke-width="2" stroke-linecap="round">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
